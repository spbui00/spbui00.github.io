<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Itinerary</title>
  <link rel="stylesheet" href="css/trip.css">
  <script src="https://kit.fontawesome.com/8ac6948fc8.js" crossorigin="anonymous"></script>
  <script type="module" src="dist/trip.bundle.js" defer></script>
</head>
<body>
    <main>
      <div class="header">
        <h1>Hello...</br>Italy</h1>
      </div>
      <div class="day">
        <h2>Day 1</h2>
        <div class="day-content">
          <div class="day-content-checkpoint">
            <div class="day-content-checkpoint-timeline">
              <div class="day-content-checkpoint-timeline-time">
                09:00
              </div>
              <div class="day-content-checkpoint-timeline-line"></div>
            </div>
            <div class="day-content-checkpoint-info">
              <div class="day-content-checkpoint-info-title">Breakfast</div>
              <div class="day-content-checkpoint-info-description">Enjoy a traditional Italian breakfast at a local cafe</div>
            </div>
          </div>

          <div class="day-content-checkpoint travel">
            <div class="day-content-checkpoint-timeline">
              <div class="day-content-checkpoint-timeline-time">10:00</div>
              <div class="day-content-checkpoint-timeline-line"></div>
            </div>
            <div class="day-content-checkpoint-info">
              <div class="day-content-checkpoint-info-title">Bus</div>
              <div class="day-content-checkpoint-info-description">ABC -> fdsf</div>
            </div>
          </div>


          <div class="day-content-checkpoint special">
            <div class="day-content-checkpoint-timeline">
              <div class="day-content-checkpoint-timeline-time">12:00</div>
              <div class="day-content-checkpoint-timeline-line"></div>
            </div>
            <div class="day-content-checkpoint-info">
              <div class="day-content-checkpoint-info-title">Lunch</div>
              <div class="day-content-checkpoint-info-description">Enjoy a traditional Italian lunch at a local cafe</div>
            </div>
          </div>
        </div>
    </main>
  </body>
</html>
